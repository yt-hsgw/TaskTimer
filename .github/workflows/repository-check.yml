name: リポジトリチェック

on:
  pull_request:
    branches:
      - main
  push: {}
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  verify:
    name: 設計・ビルド・テスト
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Node.jsを準備
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Rustを準備
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add rustfmt clippy

      - name: Linuxビルド依存関係をインストール
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            sqlite3 \
            wget

      - name: Node依存関係をインストール
        run: npm ci

      - name: npm脆弱性監査を実行
        run: npm audit --audit-level=moderate

      - name: 必須設計ファイルを確認
        run: |
          test -f README.md
          test -f AGENTS.md
          test -f LICENSE
          test -f SECURITY.md
          test -f SUPPORT.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f .github/dependabot.yml
          test -f .github/workflows/release.yml
          test -f docs/mvp-spec.md
          test -f docs/architecture.md
          test -f docs/domain-model.md
          test -f docs/database-schema.sql
          test -f docs/security.md
          test -f docs/testing.md
          test -f docs/operations.md
          test -f docs/public-operations.md
          test -f docs/public-readiness.md
          test -f docs/release-checklist.md
          test -f docs/review/checklist.md
          test -f docs/adr/0004-public-distribution-license.md
          test -f src-tauri/icons/icon.ico

      - name: SQLiteスキーマを検証
        run: |
          sqlite3 :memory: ".read docs/database-schema.sql"

      - name: SQLiteマイグレーションを検証
        run: |
          sqlite3 :memory: ".read src-tauri/migrations/0001_initial.sql"

      - name: Rustフォーマットを検証
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rustテストを実行
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Rust静的解析を実行
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: フロントエンドをビルド
        run: npm run build

      - name: 秘密情報ファイルの誤コミットを確認
        run: |
          if git ls-files | grep -E '(^|/)(\.env(\..*)?|.*\.(db|sqlite|sqlite3|pem|key|p12|mobileprovision|log))$'; then
            echo "公開リポジトリへ秘密情報、DB、鍵、証明書、ログをコミットしてはいけません"
            exit 1
          fi

      - name: 個人環境情報の誤コミットを確認
        run: |
          if git grep -n -E '(/[U]sers/|[A-Za-z]:\\[U]sers\\|/[h]ome/[^/]+/)' -- . ':!package-lock.json' ':!src-tauri/Cargo.lock'; then
            echo "公開リポジトリへ個人環境の絶対パスをコミットしてはいけません"
            exit 1
          fi
          if git grep -n -E '[[:alnum:]._%+-]+@[[:alnum:].-]+\.[[:alpha:]]{2,}' -- . ':!package-lock.json' ':!src-tauri/Cargo.lock'; then
            echo "公開リポジトリへメールアドレスを含む追跡ファイルをコミットしてはいけません"
            exit 1
          fi

      - name: 空白エラーを確認
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff --check
          fi
